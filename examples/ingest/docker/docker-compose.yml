version: "3.9"

services:
  kudu-master:
    image: ${KUDU_IMAGE}
    user: root
    command:
      - master
      - --webserver_interface=0.0.0.0
      - --webserver_port=8051
    environment:
      KUDU_MASTERS: ${KUDU_MASTER}
      MASTER_ARGS: --unlock_unsafe_flags
    ports:
      - "7051:7051"
      - "8051:8051"
    volumes:
      - kudu-master-data:/var/lib/kudu/master
    profiles:
      - core
      - ingest
      - monitoring

  kudu-tserver-1:
    image: ${KUDU_IMAGE}
    user: root
    command:
      - tserver
      - --tserver_master_addrs=${KUDU_MASTER}
      - --webserver_interface=0.0.0.0
      - --webserver_port=8050
    environment:
      KUDU_MASTERS: ${KUDU_MASTER}
      TSERVER_ARGS: --unlock_unsafe_flags
    ports:
      - "8050:8050"
    volumes:
      - kudu-tserver-1-data:/var/lib/kudu/tserver
    depends_on:
      - kudu-master
    profiles:
      - core
      - ingest
      - monitoring

  kudu-tserver-2:
    image: ${KUDU_IMAGE}
    user: root
    command:
      - tserver
      - --tserver_master_addrs=${KUDU_MASTER}
      - --webserver_interface=0.0.0.0
      - --webserver_port=8050
    environment:
      KUDU_MASTERS: ${KUDU_MASTER}
      TSERVER_ARGS: --unlock_unsafe_flags
    ports:
      - "8052:8050"
    volumes:
      - kudu-tserver-2-data:/var/lib/kudu/tserver
    depends_on:
      - kudu-master
    profiles:
      - core
      - ingest
      - monitoring

  kudu-tserver-3:
    image: ${KUDU_IMAGE}
    user: root
    command:
      - tserver
      - --tserver_master_addrs=${KUDU_MASTER}
      - --webserver_interface=0.0.0.0
      - --webserver_port=8050
    environment:
      KUDU_MASTERS: ${KUDU_MASTER}
      TSERVER_ARGS: --unlock_unsafe_flags
    ports:
      - "8053:8050"
    volumes:
      - kudu-tserver-3-data:/var/lib/kudu/tserver
    depends_on:
      - kudu-master
    profiles:
      - core
      - ingest
      - monitoring

  cpp-ingest:
    build:
      context: ../cpp
      dockerfile: Dockerfile
    command:
      - /data/${INGEST_TSV_FILE}
      - --master
      - ${KUDU_MASTER}
      - --metrics-port
      - ${INGEST_METRICS_PORT}
    environment:
      KUDU_MASTER: ${KUDU_MASTER}
      KUDU_INGEST_METRICS_PORT: ${INGEST_METRICS_PORT}
      KUDU_INGEST_METRICS_OUTPUT: ${INGEST_METRICS_OUTPUT:-}
      KUDU_INGEST_METRICS_KEEPALIVE_SECONDS: ${INGEST_METRICS_KEEPALIVE_SECONDS:-0}
    volumes:
      - ${INGEST_DATA_DIR}:/data
    ports:
      - "${INGEST_METRICS_PORT}:${INGEST_METRICS_PORT}"
    depends_on:
      - kudu-tserver-1
      - kudu-tserver-2
      - kudu-tserver-3
    profiles:
      - ingest

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-12h}
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - kudu-master
      - kudu-tserver-1
      - kudu-tserver-2
      - kudu-tserver-3
      - pushgateway
    profiles:
      - monitoring

  pushgateway:
    image: ${PUSHGATEWAY_IMAGE}
    ports:
      - "${PUSHGATEWAY_PORT:-9091}:9091"
    profiles:
      - monitoring

  grafana:
    image: ${GRAFANA_IMAGE}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  kudu-master-data:
  kudu-tserver-1-data:
  kudu-tserver-2-data:
  kudu-tserver-3-data:
  prometheus-data:
  grafana-data:
